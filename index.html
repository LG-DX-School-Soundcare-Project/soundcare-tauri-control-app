<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HEAR:O Control App</title>
    <!-- orb glb를 HTML 파싱 즉시 다운로드 (최우선) -->
    <link rel="preload" as="fetch" href="/assets/loading/liquid_glass.glb" />
    <style>
      /* 앱 시작 스플래시 — 풀스크린 orb (흰 배경) + 주변 파동 */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #ffffff;
        transition: opacity 420ms ease;
      }
      #app-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash liquid-glass-loader {
        display: block;
        width: 58vmin;
        height: 58vmin;
      }
      /* orb 주변으로 퍼져나가는 파동 링 */
      #app-splash .splash-waves {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
      }
      #app-splash .splash-waves span {
        position: absolute;
        width: 52vmin;
        height: 52vmin;
        border-radius: 50%;
        box-shadow: 0 0 0 1.5px rgba(150, 152, 165, 0.28),
          0 24px 60px rgba(140, 142, 158, 0.12),
          inset 0 0 30px rgba(190, 192, 205, 0.1);
        opacity: 0;
      }
      /* 파동은 orb 모델이 실제로 표시된 뒤(loader-ready)부터 시작 */
      #app-splash.is-ready .splash-waves span {
        animation: splash-wave 3s ease-out infinite;
      }
      #app-splash .splash-waves span:nth-child(2) {
        animation-delay: 1s;
      }
      #app-splash .splash-waves span:nth-child(3) {
        animation-delay: 2s;
      }
      @keyframes splash-wave {
        0% {
          transform: scale(0.92);
          opacity: 0;
        }
        25% {
          opacity: 0.7;
        }
        100% {
          transform: scale(1.7);
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .splash-waves span {
          animation: none;
        }
      }
    </style>
    <!-- orb 컴포넌트를 앱 본체(main.js)보다 먼저 로드해 스플래시를 우선 표시 -->
    <script type="module" src="/src/components/liquidGlassLoader.js"></script>
  </head>
  <body>
    <div id="app-splash" aria-label="앱 로딩 중" role="status">
      <liquid-glass-loader></liquid-glass-loader>
      <div class="splash-waves" aria-hidden="true"><span></span><span></span><span></span></div>
    </div>
    <script>
      // orb 모델이 화면에 나타나는 순간부터 파동 시작
      (function () {
        var splash = document.getElementById('app-splash');
        if (!splash) return;
        splash.addEventListener('loader-ready', function () {
          splash.classList.add('is-ready');
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module">
      // 스플래시(orb)가 먼저 그려지도록 앱 본체는 다음 프레임부터 백그라운드 로드
      requestAnimationFrame(() => {
        import('/src/main.js');
      });
    </script>
  </body>
</html>
